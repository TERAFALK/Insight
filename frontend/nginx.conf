server {
    listen 80;
    server_tokens off;

    # ── Säkerhetsheaders ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS — får effekt först när sidan serveras över HTTPS (terminering sker uppströms)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Revalidera alltid (SPA:n är en enda index.html — undvik att gammal frontend cachas)
    add_header Cache-Control "no-cache" always;
    # CSP — appen kör inline-script/-style i index.html, därav 'unsafe-inline'.
    # Tightare script-src kräver att frontend bryts ut i egna filer (Fas 8).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
