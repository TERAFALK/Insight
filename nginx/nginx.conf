events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTTP → HTTPS redirect (avkommentera när du har SSL-certifikat)
    # server {
    #     listen 80;
    #     server_name portal.terafalk.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # Frontend — statisk HTML
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # PDF-nedladdning direkt från volym
        location /reports/ {
            alias /var/reports/;
            add_header Content-Disposition attachment;
        }
    }

    # HTTPS (avkommentera och sätt in din domän när certifikat finns)
    # server {
    #     listen 443 ssl;
    #     server_name portal.terafalk.com;
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     location / { proxy_pass http://frontend:80; }
    #     location /api/ {
    #         proxy_pass http://backend:8000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #     }
    # }
}
